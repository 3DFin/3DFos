[build-system]
requires = ["uv_build>=0.7.12,<0.8.0"]
build-backend = "uv_build"

[project]
name = "PTV3-3DFos"
version = "0.1.0"
description = "Add your description here"
requires-python = ">=3.12.0,<3.13.0"
readme = "README.md"

dependencies = [
    "addict>=2.4.0",
    "dendroptimized>=0.2.2",
    "laspy>=2.5.4",
    "lazrs>=0.7.0",
    "pgeof>=0.3.2",
    "plyfile>=1.1.2",
]

[project.optional-dependencies]
flash-attn = ["flash-attn==2.7.4.post1"]
cpu = [
    "timm>=1.0.15",
    "torch~=2.6.0",
    "torch-geometric>=2.6.1",
    "torchvision~=0.21.0",
    "spconv>=2.3.8"
]
cu126 = [
    "timm>=1.0.15",
    "torch~=2.6.0",
    "torch-geometric>=2.6.1",
    "torchvision~=0.21.0",
    "spconv-cu126>=2.3.8"
]

[tool.uv]
no-build-isolation-package = ["flash-attn"]
conflicts = [
  [
    { extra = "cpu" },
    { extra = "cu126" },
  ],
]

[[tool.uv.dependency-metadata]]
requires-dist = ["torch", "setuptools", "einops"]
name = "flash-attn"
version = "2.7.4.post1"

[tool.uv.sources]
torch = [
    { index = "pytorch-cpu", extra = "cpu" },
    { index = "pytorch-cu126", extra = "cu126", marker = "sys_platform == 'win32'" },
]
torchvision = [
    { index = "pytorch-cpu", extra = "cpu" },
    { index = "pytorch-cu126", extra = "cu126", marker = "sys_platform == 'win32'"},
]

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[[tool.uv.index]]
name = "pytorch-cu126"
url = "https://download.pytorch.org/whl/cu126"
explicit = true

[project.scripts]
3DFos = "ptv3_3dfos.inference:main" # inference tailored for 3DFin
